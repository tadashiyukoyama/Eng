<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Portal do Cliente — Klaus OS</title>
  <link rel="stylesheet" href="/assets/css/styles.css" />
</head>
<body>
  <header class="site-header">
    <div class="container nav">
      <a href="/" class="brand">
        <div class="brand-mark">⚡</div>
        <div><div>Klaus OS</div><small>IA operacional</small></div>
      </a>
      <nav class="nav-links">
        <a href="/">Home</a>
        <a href="/contato">Contato</a>
        <button class="btn btn-secondary" type="button" data-logout>Sair</button>
      </nav>
    </div>
  </header>

  <main class="portal-shell">
    <section class="auth-card">
      <div class="badge">Portal do cliente</div>
      <h1 style="font-size:42px; letter-spacing:-0.05em; margin:18px 0 12px;">Sua área de acesso</h1>
      <p class="small">Aqui o cliente já consegue entrar, ver plano, pedidos e o status do acesso liberado automaticamente pela compra demo/local.</p>
      <div data-portal-root style="margin-top:22px;">
        <div class="notice">Carregando portal...</div>
      </div>
    </section>
  </main>

  <script src="/assets/js/app.js"></script>

</html>
